<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng Thiếu Nhi </title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --pink:#e8a0c0; --deep:#06000f; }
html,body { width:100%;height:100%;background:var(--deep);overflow:hidden;font-family:'Cormorant Garamond',serif;color:#fff; }
canvas { display:block; }

/* GATE */
#gate {
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#130020 0%,#06000f 70%);
  transition:opacity 1.4s ease;
}
#gate.hide { opacity:0;pointer-events:none; }
.gate-card {
  background:rgba(255,255,255,.035);
  border:1px solid rgba(232,160,192,.22);
  border-radius:24px;padding:44px 50px 36px;
  max-width:380px;width:90%;
  backdrop-filter:blur(20px);text-align:center;
  box-shadow:0 0 90px rgba(155,109,255,.1);
}
.gate-icon { font-size:44px;display:block;margin-bottom:18px;animation:pulse-icon 2.5s ease-in-out infinite; }
@keyframes pulse-icon {
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(255,110,180,.6))}
  50%{transform:scale(1.08);filter:drop-shadow(0 0 22px rgba(255,110,180,1))}
}
.gate-title { font-family:'Dancing Script',cursive;font-size:25px;color:var(--pink);margin-bottom:6px;letter-spacing:1px; }
.gate-sub { font-size:13px;color:rgba(255,255,255,.38);margin-bottom:28px;font-style:italic; }
.input-label { display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:7px;text-align:left; }
.gate-input {
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(232,160,192,.2);border-radius:12px;
  padding:14px 18px;color:#fff;font-size:16px;
  font-family:'Cormorant Garamond',serif;outline:none;transition:all .3s;
}
.gate-input:focus { border-color:rgba(232,160,192,.6);background:rgba(255,255,255,.09);box-shadow:0 0 20px rgba(232,160,192,.1); }
.gate-input::placeholder { color:rgba(255,255,255,.22); }
.pw-hint { font-size:15px;color:rgba(232,160,192,.5);margin-top:6px;text-align:left;font-style:italic; }
.gate-btn {
  width:100%;padding:15px;margin-top:22px;
  background:linear-gradient(135deg,rgba(232,160,192,.18),rgba(155,109,255,.18));
  border:1px solid rgba(232,160,192,.38);border-radius:12px;
  color:#fff;font-size:14px;font-family:'Dancing Script',cursive;font-weight:600;
  letter-spacing:1.5px;cursor:pointer;transition:all .3s;
}
.gate-btn:hover { background:linear-gradient(135deg,rgba(232,160,192,.32),rgba(155,109,255,.32));border-color:rgba(232,160,192,.75);box-shadow:0 0 30px rgba(232,160,192,.18);transform:translateY(-1px); }
.error-msg { color:rgba(255,120,120,.9);font-size:15px;margin-top:12px;height:18px;font-style:italic; }

/* CANVAS */
#main-canvas { position:fixed;inset:0;z-index:1; }

/* PHOTO */
#user-photo {
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:min(300px,62vw);height:min(480px,76vh);
  object-fit:cover;object-position:top center;
  z-index:2;opacity:0;transition:opacity 2.5s ease;
  mask-image:linear-gradient(to top,transparent 0%,rgba(0,0,0,.5) 16%,rgba(0,0,0,.85) 40%,rgba(0,0,0,.4) 76%,transparent 100%);
  -webkit-mask-image:linear-gradient(to top,transparent 0%,rgba(0,0,0,.5) 16%,rgba(0,0,0,.85) 40%,rgba(0,0,0,.4) 76%,transparent 100%);
  filter:brightness(.7) saturate(1.1);pointer-events:none;
}
#user-photo.show { opacity:1; }
#user-photo.hide { opacity:0; transition:opacity 1.8s ease; }

/* CELEBRATE */
#celebrate {
  position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);
  z-index:10;pointer-events:none;
  font-family:'Dancing Script',cursive;
  color:#fff;text-align:center;white-space:nowrap;
  opacity:0;font-size:16px;
  text-shadow:0 0 30px rgba(255,110,180,.9),0 0 60px rgba(200,80,255,.6);
}

/* TAP HINT */
#tap-hint {
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:10;font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:27px;color:rgba(255,255,255,.45);
  letter-spacing:2px;text-align:center;
  opacity:0;transition:opacity 1s;pointer-events:none;
}
#tap-hint.show { opacity:1;animation:float-hint 2.5s ease-in-out infinite; }
@keyframes float-hint {
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-6px)}
}

/* MUSIC BTN */
#music-btn {
  position:fixed;bottom:26px;right:26px;z-index:50;
  width:48px;height:48px;border-radius:50%;
  background:rgba(232,160,192,.1);border:1px solid rgba(232,160,192,.32);
  color:rgba(255,255,255,.75);font-size:19px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .3s;backdrop-filter:blur(10px);opacity:0;
}
#music-btn.show { opacity:1; }
#music-btn:hover { background:rgba(232,160,192,.22);border-color:rgba(232,160,192,.7);box-shadow:0 0 20px rgba(232,160,192,.28);transform:scale(1.08); }
#music-btn.playing { animation:spin-slow 5s linear infinite; }
@keyframes spin-slow { to{transform:rotate(360deg)} }
#music-btn.playing:hover { animation-play-state:paused;transform:scale(1.08); }

#vignette { position:fixed;inset:0;z-index:9;background:radial-gradient(ellipse at 50% 55%,transparent 28%,rgba(4,0,12,.5) 100%);pointer-events:none; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <span class="gate-icon">🌸</span>
    <div class="gate-title">Dành riêng cho bạn Song Ngọc</div>
    <div class="pw-hint">Nhập mật khẩu để mở cửa trái timmm</div>
    <input class="gate-input" id="pw-input" type="password" placeholder="bi ba bi bo gì đó" autocomplete="off">
    <div class="pw-hint">Nói nhỏ cho bà nghe: Instagram của công chúa tui</div>
    <button class="gate-btn" id="gate-btn">Tìm ra chưa, ra rồi thì bấm đây</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<canvas id="main-canvas"></canvas>
<img id="user-photo" src="./anh_ngoc.jpg" alt="">
<div id="celebrate"></div>
<div id="tap-hint">Đừng bấm coi chừng bất ngờ đó :Đ</div>
<div id="vignette"></div>
<button id="music-btn">🎵</button>
<audio id="audio-player" src="./nhac.mp3" loop></audio>

<script>
// ══════════════════════════════
//  CONFIG
// ══════════════════════════════
const PASSWORD   = "_snqc._"; 
const MUSIC_FILE = "./nhac.mp3";
const CELEBRATE_TEXT = "Chúc mừng ngày quốc tế thiếu nhi 🌸";
const MESSAGES = [
  { text:"Shipp quà cho công chúaa ạ",         sz:17, italic:false },
  { text:"Chúc bà quốc tế thiếu nhi vui vẻ",              sz:22, italic:true  },
  { text:"Luôn luôn tươi cười vui vẻ",   sz:18, italic:false },
  { text:"Luôn lạc quan trước những khó khăn", sz:15, italic:true  },
  { text:"Mãi là công túaaa nhaa",         sz:17, italic:false },
  { text:"Học hành thuận lợi :Đ",            sz:21, italic:true  },
  { text:"Bất ngờ chưaaa",  sz:18, italic:true  },
  { text:"Mãi xinh tươi như tuổi 18 ạ :Đ",    sz:15, italic:false },
  { text:"Tính cách cứ trẻ con dễ thương z nha",  sz:17, italic:true  },
  { text:"Vẫn còn là quốc tế đừng chê nha(bên việt nam )",      sz:20, italic:false },
  { text:"Hết òi ạ",      sz:20, italic:false },

];

// ══════════════════════════════
//  CANVAS
// ══════════════════════════════
const C  = document.getElementById('main-canvas');
const CX = C.getContext('2d');
let W, H;
function resize(){ W=C.width=window.innerWidth; H=C.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════
//  STATE
// ══════════════════════════════
// 'idle' → 'phase1' → 'gathering' → 'phase2'
let phase = 'idle';

// ══════════════════════════════
//  SINGLE PARTICLE POOL
//  Mỗi hạt có: vị trí (x,y), đích (tx,ty), màu, trạng thái
// ══════════════════════════════
const TOTAL_PARTICLES = 850;
let particles = [];

function makeParticle(){
  const pink = Math.random() < .58;
  return {
    // vị trí hiện tại — trải đều khắp màn hình
    x: Math.random() * W,
    y: Math.random() * H,
    // vận tốc trôi nổi
    vx: (Math.random() - .5) * .55,
    vy: (Math.random() - .5) * .55,
    // kích thước
    r: Math.random() < .45 ? 1.6 + Math.random() * 2.0 : .4 + Math.random() * 1.1,
    // nhấp nháy
    twPhase: Math.random() * Math.PI * 2,
    twSpeed: .02 + Math.random() * .04,
    // màu
    pink,
    hue:  pink ? 330 + Math.random() * 30 : -1,
    sat:  65 + Math.random() * 28,
    lit:  72 + Math.random() * 22,
    // đích tim (set khi bắt đầu gathering)
    tx: 0, ty: 0,
    // tiến trình bay vào tim (0→1)
    prog: 0,
    // delay ngẫu nhiên để các hạt không bay cùng lúc
    delay: 0,
    done: false,
  };
}

function initParticles(){
  particles = [];
  for(let i = 0; i < TOTAL_PARTICLES; i++) particles.push(makeParticle());
}
initParticles();

// ══════════════════════════════
//  HEART MATH
// ══════════════════════════════
function heartXY(t){
  const x =  16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return [x/17, y/17];
}

function assignHeartTargets(){
  const cx = W / 2;
  const cy = H * .42;
  const R  = Math.min(W * .23, 145);

  const EDGE = 540, FILL = 310;
  const targets = [];

  // viền tim
  for(let i = 0; i < EDGE; i++){
    const t = (i / EDGE) * Math.PI * 2;
    const [hx, hy] = heartXY(t);
    const jitter = (Math.random() - .5) * .13;
    const nx = Math.cos(t + Math.PI/2), ny = Math.sin(t + Math.PI/2);
    targets.push({ tx: cx + (hx + nx*jitter)*R, ty: cy + (hy + ny*jitter)*R });
  }

  // bên trong tim
  for(let i = 0; i < FILL; i++){
    let px = 0, py = 0;
    for(let k = 0; k < 30; k++){
      const t = Math.random() * Math.PI * 2;
      const s = Math.random();
      const [hx, hy] = heartXY(t);
      px = hx * s * .80; py = hy * s * .80;
      const q = px*px + (py - Math.pow(Math.abs(px), 2/3))**2;
      if(q < .86) break;
    }
    targets.push({ tx: cx + px*R, ty: cy + py*R });
  }

  // gán target cho từng hạt; nếu hạt ít hơn target thì bỏ bớt target
  const count = Math.min(targets.length, particles.length);
  // shuffle để các hạt ở nhiều vị trí khác nhau bay đến các vị trí khác nhau
  const shuffled = particles.slice().sort(() => Math.random() - .5);

  for(let i = 0; i < count; i++){
    const p = shuffled[i];
    p.tx    = targets[i].tx;
    p.ty    = targets[i].ty;
    // stagger: hạt xa tim bay vào trễ hơn chút
    const dist = Math.hypot(p.x - p.tx, p.y - p.ty);
    p.delay = (dist / (Math.sqrt(W*W+H*H))) * 0.55 + Math.random() * .15;
    p.prog  = -p.delay;   // âm = chờ
    p.done  = false;
    p.isHeart = true;
  }
  // hạt còn lại không vào tim — ẩn dần
  for(let i = count; i < particles.length; i++){
    particles[i].isHeart = false;
    particles[i].fadeOut = true;
    particles[i].fadeOpacity = 1;
  }
}

// ══════════════════════════════
//  DRAW PARTICLES
// ══════════════════════════════
let heartPulse = 0;

function drawParticles(){
  heartPulse += .016;
  const cx = W/2, cy = H*.42;
  const ps = 1 + .034 * Math.sin(heartPulse);

  for(const p of particles){

    // ── phase1 / gathering: hạt trôi nổi tự do
    if(phase === 'phase1'){
      p.x += p.vx; p.y += p.vy;
      // bounce nhẹ ở biên
      if(p.x < 0 || p.x > W) p.vx *= -1;
      if(p.y < 0 || p.y > H) p.vy *= -1;
      p.twPhase += p.twSpeed;
      const tw = .45 + .55 * Math.abs(Math.sin(p.twPhase));
      CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, Math.PI*2);
      CX.fillStyle = p.hue < 0
        ? `rgba(255,255,255,${tw*.82})`
        : `hsla(${p.hue},${p.sat}%,${p.lit}%,${tw*.85})`;
      CX.fill();
      continue;
    }

    // ── gathering: hạt bay vào tim
    if(phase === 'gathering' || phase === 'phase2'){

      if(p.fadeOut){
        // hạt không vào tim, fade out
        if(p.fadeOpacity > 0){
          p.fadeOpacity = Math.max(0, p.fadeOpacity - .012);
          p.x += p.vx * .3; p.y += p.vy * .3;
          p.twPhase += p.twSpeed;
          const tw = p.fadeOpacity * (.45 + .55*Math.abs(Math.sin(p.twPhase)));
          CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, Math.PI*2);
          CX.fillStyle = p.hue < 0
            ? `rgba(255,255,255,${tw})`
            : `hsla(${p.hue},${p.sat}%,${p.lit}%,${tw})`;
          CX.fill();
        }
        continue;
      }

      if(!p.done){
        p.prog = Math.min(1, p.prog + .004);  // chậm: ~250 frames = ~4s
        if(p.prog <= 0) continue; // vẫn đang delay
        const e = 1 - Math.pow(1 - p.prog, 3); // ease-out-cubic
        p.x += (p.tx - p.x) * e * .04;
        p.y += (p.ty - p.y) * e * .04;
        if(p.prog >= 1 && Math.hypot(p.x - p.tx, p.y - p.ty) < .8) p.done = true;
      }

      // vị trí vẽ có pulse tim
      const dx = p.tx - cx, dy = p.ty - cy;
      const stray = 1 - Math.min(1, Math.max(0, p.prog) * 1.6);
      const X = cx + dx*ps + (p.x - p.tx)*stray;
      const Y = cy + dy*ps + (p.y - p.ty)*stray;

      p.twPhase += p.twSpeed;
      const tw = .42 + .58 * Math.abs(Math.sin(p.twPhase));
      CX.beginPath(); CX.arc(X, Y, p.r, 0, Math.PI*2);
      CX.fillStyle = p.hue < 0
        ? `rgba(255,255,255,${tw*.9})`
        : `hsla(${p.hue},${p.sat}%,${p.lit}%,${tw*.93})`;
      CX.fill();
    }
  }

  // glow sau tim
  if(phase === 'gathering' || phase === 'phase2'){
    const g = CX.createRadialGradient(cx, cy, 0, cx, cy, W*.22);
    g.addColorStop(0, 'rgba(255,100,170,.07)');
    g.addColorStop(.6,'rgba(180,80,200,.03)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    CX.fillStyle = g; CX.fillRect(0,0,W,H);
  }
}

// ══════════════════════════════
//  GROUND PARTICLES (phase1 only)
// ══════════════════════════════
let gp = [];
function newGP(randY){
  return{
    x:Math.random()*W,
    y:randY?H-Math.random()*Math.random()*150:H-5,
    r:Math.random()*1.6+.2,
    vx:(Math.random()-.5)*.28,
    vy:-Math.random()*.48-.08,
    life:randY?Math.random()*150:0,
    max:Math.random()*180+80,
    pink:Math.random()<.5,
  };
}
function initGround(){ gp=[]; for(let i=0;i<220;i++) gp.push(newGP(true)); }
initGround();

function drawGround(){
  if(phase !== 'phase1') return;
  for(let i=0;i<gp.length;i++){
    const p=gp[i]; p.life++;
    if(p.life>p.max){gp[i]=newGP(false);continue;}
    const t=p.life/p.max, o=t<.18?t/.18:t>.78?(1-t)/.22:1;
    p.x+=p.vx; p.y+=p.vy;
    CX.beginPath(); CX.arc(p.x,p.y,p.r,0,Math.PI*2);
    CX.fillStyle=p.pink?`rgba(255,155,215,${o*.65})`:`rgba(255,255,255,${o*.6})`;
    CX.fill();
  }
}

// ══════════════════════════════
//  ORBIT TEXTS
// ══════════════════════════════
let orbitItems = [];

function spawnOrbitTexts(){
  const cx = W/2, cy = H*.42;
  const R  = Math.min(W*.23, 145);
  const baseR = R + 58;

  MESSAGES.forEach((m, i) => {
    setTimeout(()=>{
      orbitItems.push({
        text: m.text, italic: m.italic, sz: m.sz,
        cx, cy,
        r: baseR + (i % 3) * 48,
        angle: (i / MESSAGES.length) * Math.PI * 2,
        speed: (i%2===0?1:-1) * (.000025 + i*.0000025),
        opacity: 0,
      });
    }, i * 1200);
  });
}

function drawOrbit(){
  for(const item of orbitItems){
    item.opacity = Math.min(1, item.opacity + .007);
    item.angle  += item.speed * 60;
    const x = item.cx + Math.cos(item.angle) * item.r;
    const y = item.cy + Math.sin(item.angle) * item.r;
    CX.save();
    CX.translate(x, y);
    CX.globalAlpha = item.opacity * .78;
    CX.font = `${item.italic?'italic ':''} 300 ${item.sz}px 'Cormorant Garamond',serif`;
    CX.fillStyle = '#fff';
    CX.textAlign = 'center';
    CX.textBaseline = 'middle';
    CX.shadowColor = 'rgba(255,100,170,.5)';
    CX.shadowBlur  = 12;
    CX.fillText(item.text, 0, 0);
    CX.restore();
  }
}


// ══════════════════════════════
//  SPARKLE BURST (phase2) — hạt tỏa ra từ tim liên tục
// ══════════════════════════════
let bursts = [];

function spawnBurst(){
  const cx = W/2, cy = H*.42;
  // mỗi lần spawn 6-10 hạt bắn ra từ vùng tim
  const count = 6 + Math.floor(Math.random()*5);
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = .8 + Math.random()*2.2;
    const pink  = Math.random()<.6;
    // xuất phát từ vùng tim (bán kính ~80px)
    const R = Math.min(W*.23,145);
    const t = Math.random()*Math.PI*2;
    const [hx,hy] = [16*Math.pow(Math.sin(t),3)/17, -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/17];
    bursts.push({
      x: cx + hx*R*(.7+Math.random()*.5),
      y: cy + hy*R*(.7+Math.random()*.5),
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - .4,
      r: .4 + Math.random()*1.6,
      life: 0,
      max: 80 + Math.random()*120,
      phase: Math.random()*Math.PI*2,
      speed: .03+Math.random()*.05,
      pink,
      hue: pink ? 330+Math.random()*30 : -1,
      sat: 70+Math.random()*25,
      lit: 75+Math.random()*20,
    });
  }
}

let burstTimer = 0;
function drawBursts(){
  burstTimer++;
  if(burstTimer % 8 === 0) spawnBurst(); // spawn mỗi 8 frame (~7-8 lần/giây)

  for(let i=bursts.length-1;i>=0;i--){
    const s=bursts[i]; s.life++;
    if(s.life>s.max){ bursts.splice(i,1); continue; }
    const t=s.life/s.max;
    const o=t<.15?t/.15:1-t; // fade in nhanh, fade out từ từ
    s.x+=s.vx; s.y+=s.vy;
    s.vy+=.015; // trọng lực nhẹ
    s.vx*=.995; s.vy*=.995;
    s.phase+=s.speed;
    const tw=o*(.5+.5*Math.abs(Math.sin(s.phase)));
    CX.beginPath(); CX.arc(s.x,s.y,s.r,0,Math.PI*2);
    CX.fillStyle=s.hue<0
      ? `rgba(255,255,255,${tw*.85})`
      : `hsla(${s.hue},${s.sat}%,${s.lit}%,${tw*.9})`;
    CX.fill();
  }
}

// ══════════════════════════════
//  CELEBRATE TEXT
// ══════════════════════════════
let celebStart = null, celebRunning = false;
const celebEl = document.getElementById('celebrate');
celebEl.textContent = CELEBRATE_TEXT;

function animateCelebrate(ts){
  if(!celebRunning) return;
  if(!celebStart) celebStart = ts;
  const dur = 3600;
  const t = ((ts - celebStart) % dur) / dur;
  celebEl.style.opacity   = t < .5 ? t/.5 : 1-(t-.5)/.5;
  celebEl.style.fontSize  = (.3 + t*2.2)*17 + 'px';
  celebEl.style.letterSpacing = (t*5) + 'px';
  requestAnimationFrame(animateCelebrate);
}

// ══════════════════════════════
//  MAIN LOOP
// ══════════════════════════════
function loop(){
  CX.clearRect(0, 0, W, H);
  drawGround();
  drawParticles();
  if(phase === 'phase2'){ drawBursts(); drawOrbit(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════
//  MUSIC
// ══════════════════════════════
const audio = document.getElementById('audio-player');
audio.src = MUSIC_FILE; audio.volume = .7;
let musicPlaying = false;

function tryPlayMusic(){
  audio.play().then(()=>{
    musicPlaying = true;
    document.getElementById('music-btn').classList.add('playing');
    document.getElementById('music-btn').textContent = '🎶';
  }).catch(()=>{});
}
function toggleMusic(){
  if(musicPlaying){ audio.pause(); musicPlaying=false; document.getElementById('music-btn').classList.remove('playing'); document.getElementById('music-btn').textContent='🎵'; }
  else { audio.play(); musicPlaying=true; document.getElementById('music-btn').classList.add('playing'); document.getElementById('music-btn').textContent='🎶'; }
}
document.getElementById('music-btn').addEventListener('click', toggleMusic);

// ══════════════════════════════
//  GATE
// ══════════════════════════════
function tryEnter(){
  const pw  = document.getElementById('pw-input').value.trim();
  const err = document.getElementById('error-msg');
  if(!pw){ err.textContent='Eeee thiếu mật khẩu rồi bà ơi'; return; }
  if(pw !== PASSWORD){ err.textContent='Công chúa quên mật khẩu roài hẻ'; document.getElementById('pw-input').value=''; document.getElementById('pw-input').focus(); return; }
  err.textContent = '';
  tryPlayMusic();
  startPhase1();
}
document.getElementById('gate-btn').addEventListener('click', tryEnter);
document.getElementById('pw-input').addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });

// ══════════════════════════════
//  PHASE 1 — đốm sáng trôi nổi + ảnh + chữ chúc mừng
// ══════════════════════════════
function startPhase1(){
  phase = 'phase1';

  const gate = document.getElementById('gate');
  gate.classList.add('hide');
  setTimeout(()=>gate.style.display='none', 1500);

  setTimeout(()=>document.getElementById('user-photo').classList.add('show'), 600);

  setTimeout(()=>{
    celebRunning = true;
    requestAnimationFrame(animateCelebrate);
  }, 900);

  setTimeout(()=>document.getElementById('music-btn').classList.add('show'), 1500);
  setTimeout(()=>document.getElementById('tap-hint').classList.add('show'), 3000);

  // bấm vào → phase 2
  function onTap(e){
    if(e.target.id === 'music-btn') return;
    document.removeEventListener('click', onTap);
    startGathering();
  }
  setTimeout(()=>document.addEventListener('click', onTap), 3400);
}

// ══════════════════════════════
//  GATHERING — chính các đốm đang trôi bay vào tạo tim
// ══════════════════════════════
function startGathering(){
  phase = 'gathering';

  // ẩn hint và chữ chúc mừng
  document.getElementById('tap-hint').classList.remove('show');
  celebRunning = false;
  celebEl.style.opacity = 0;

  // ảnh fade out khi tim bắt đầu hình thành
  const photo = document.getElementById('user-photo');
  photo.classList.remove('show');
  photo.classList.add('hide');

  // gán target tim cho từng hạt — chúng sẽ bay từ vị trí hiện tại
  assignHeartTargets();

  // chuyển sang phase2 sau khi tim đã hình thành xong (~7s)
  setTimeout(()=>{
    phase = 'phase2';
    spawnOrbitTexts();
  }, 7000);
}

// ══════════════════════════════
//  RESIZE
// ══════════════════════════════
window.addEventListener('resize',()=>{
  resize(); initParticles(); initGround();
});
</script>
